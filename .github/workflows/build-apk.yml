name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Build debug APK (sideload-ready, no signing needed)
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakdelERP-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release with APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MAKDEL ERP APK build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "Auto-built sideloadable APK. Download app-debug.apk below and install on your Android phone (enable 'Install unknown apps' for your browser/file manager)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
